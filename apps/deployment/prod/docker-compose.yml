services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    restart: unless-stopped
    mem_limit: ${REDIS_MEMORY_LIMIT:-1536m}
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-1536m}

  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_SERVER: pgbouncer
      POSTGRES_PORT: 6432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      USE_PGBOUNCER: "true"
      DB_EAGER_CONNECT: "true"
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_EAGER_CONNECT: "true"
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    volumes:
      - uploads:/app/storage/uploads
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    build:
      context: ../../api
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    command: ["celery", "-A", "app.infrastructure.celery.worker", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_SERVER: pgbouncer
      POSTGRES_PORT: 6432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      USE_PGBOUNCER: "true"
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - uploads:/app/storage/uploads
    deploy:
      resources:
        limits:
          memory: 512m

  prometheus:
    image: prom/prometheus:v3.11.1
    restart: unless-stopped
    mem_limit: 512m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          memory: 512m

  loki:
    image: grafana/loki:3.6.10
    restart: unless-stopped
    mem_limit: 512m
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    deploy:
      resources:
        limits:
          memory: 512m

  alloy:
    image: grafana/alloy:v1.14.0
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      - loki
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${ALLOY_PORT:-12345}:12345"
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana:12.4.2
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_EMAIL: ${GRAFANA_ADMIN_EMAIL:-}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 384m

  nginx:
    image: nginx:1.29.8-alpine
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      - api
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128m

  certbot:
    image: certbot/certbot:v5.5.0
    mem_limit: 128m
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"

volumes:
  postgres_data:
  uploads:
  prometheus_data:
  loki_data:
  alloy_data:
  grafana_data:
  certbot_www:
  certbot_certs:
