[databases]
focusread = host=postgres port=5432 dbname=focusread

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction-level pooling for async driver compatibility
pool_mode = transaction

; Pool sizing
default_pool_size = 20
min_pool_size = 5
max_client_conn = 200
max_db_connections = 20

; Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
server_connect_timeout = 15

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Admin console
admin_users = focusread
stats_users = focusread
